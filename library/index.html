<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the Brooklyn Library</title>
   <link rel="stylesheet" href="css/reset.css">
   <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="wraper">
            <div class="wraper_header">
                <div class="header_logo">
                     <h1>Brooklyn Public Library</h1>
                </div>
                <div class="header-container">
                    <nav class="menu">
                        <ul class="header_list">
                            <li class="header_item">
                                <a href="#!" class="header-link" title="About">About</a>
                            </li>

                            <li class="header_item">
                                <a href="#!" class="header-link" title="Favorites">Favorites</a>
                            </li>

                            <li class="header_item">
                                <a href="#!" class="header-link" title="Coffee shop">Coffee shop</a>
                            </li>

                            <li class="header_item">
                                <a href="#!" class="header-link" title="Contacts">Contacts</a>
                            </li>

                            <li class="header_item">
                                <a href="#!" class="header-link" title="Library Card">Library Card</a>
                            </li>
                        </ul>
                    </nav>
                    <div class="header_item_icon">
                        <div class="dropdown">
                            <img src="../library/img/svg/icon_header.svg" class="dropbtn" alt="icon_prowili">
                            <div class="dropdown-content">
                                <h3>Profile</h3>
                                <div class="line"></div>
                                <a href="#!" class="nav-link">Log In</a>
                                <a href="#!" class="nav-link">Register</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="intro">
            <div class="wraper_main">
                <h1 class="into_title">
                    Welcome <br>to the Brooklyn Library
                </h1>
            </div>
        </div>

        <section class="main_about">
            <div class="about-text">
                <h2 >
                    About

                </h2>
                <div class="main_line"> </line>
            </div>
                <p class="main_about_p">
                    The Brooklyn Library is a free workspace, a large number of books and a cozy coffee shop inside
                </p>

            <div class="image-items">
                <div class="image-library">
                    <img src="../library/img/svg/main-about1.jpg" alt="image library">
                </div>
                <div class="image-library">
                    <img src="../library/img/svg/main-about2.jpg" alt="image library">
                </div>
                <div class="image-library">
                    <img src="../library/img/svg/main-about3.jpg" alt="image library">
                </div>
            </div>

            <div class="pagination-panel">
                <div class="pagination-container">
                    <div class="carousel-pagination active"></div>  
                </div>
                <div class="pagination-container">
                    <div class="carousel-pagination"></div>
                </div>
                <div class="pagination-container">
                    <div class="carousel-pagination"></div>
                </div>
            </div>

            <div class="about-text">
                <h2>
                    Favorites                        
                </h2>
                <div class="main_line"></line>
            </div>

        </section>


    </main>

</body>
</html>
